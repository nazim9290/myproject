<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgencyBook — Test Runner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif}
.header{position:sticky;top:0;z-index:10;background:#111827;border-bottom:1px solid #1e293b;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
h1{font-size:18px;display:flex;align-items:center;gap:8px}
.stats{display:flex;gap:16px;font-size:12px}
.stat{text-align:center}
.stat-val{font-size:20px;font-weight:700}
.stat-val.green{color:#22c55e}.stat-val.red{color:#f43f5e}.stat-val.blue{color:#22d3ee}.stat-val.amber{color:#f59e0b}
.progress-bar{height:6px;background:#1e293b;border-radius:3px;overflow:hidden;margin:0 24px 0 24px}
.progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#22d3ee);border-radius:3px;transition:width .3s}
.controls{padding:12px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #1e293b}
.filter-btn{padding:6px 14px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;font-size:11px;cursor:pointer}
.filter-btn:hover{background:#1e293b;color:#e2e8f0}
.filter-btn.active{background:#22d3ee20;color:#22d3ee;border-color:#22d3ee40}
.search{flex:1;min-width:200px;padding:8px 14px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:12px;outline:none}
.search:focus{border-color:#22d3ee}
.main{padding:16px 24px}
.test-card{background:#111827;border:1px solid #1e293b;border-radius:12px;margin-bottom:12px;overflow:hidden;transition:all .2s}
.test-card:hover{border-color:#334155}
.test-card.pass{border-left:3px solid #22c55e}
.test-card.fail{border-left:3px solid #f43f5e}
.test-card.skip{border-left:3px solid #f59e0b}
.test-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.test-id{font-family:monospace;font-size:10px;color:#64748b;min-width:55px}
.test-module{font-size:10px;padding:2px 8px;border-radius:10px;background:#22d3ee15;color:#22d3ee;white-space:nowrap}
.test-title{flex:1;font-size:13px;font-weight:600}
.priority{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:700}
.priority.HIGH{background:#f43f5e20;color:#f43f5e}
.priority.MEDIUM{background:#f59e0b20;color:#f59e0b}
.priority.LOW{background:#22c55e20;color:#22c55e}
.actions{display:flex;gap:4px}
.action-btn{width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.action-btn.pass-btn{background:#22c55e20;color:#22c55e}.action-btn.pass-btn:hover{background:#22c55e40}
.action-btn.fail-btn{background:#f43f5e20;color:#f43f5e}.action-btn.fail-btn:hover{background:#f43f5e40}
.action-btn.skip-btn{background:#f59e0b20;color:#f59e0b}.action-btn.skip-btn:hover{background:#f59e0b40}
.action-btn.reset-btn{background:#64748b20;color:#64748b}.action-btn.reset-btn:hover{background:#64748b40}
.test-body{display:none;padding:0 16px 16px 16px;border-top:1px solid #1e293b}
.test-card.open .test-body{display:block}
.step-box{background:#0f172a;border-radius:8px;padding:12px;margin-top:10px;font-size:12px;line-height:1.8;white-space:pre-wrap;color:#cbd5e1}
.expected{background:#22c55e08;border:1px solid #22c55e20;border-radius:8px;padding:12px;margin-top:10px;font-size:12px;line-height:1.6;color:#86efac}
.comment-box{margin-top:10px;width:100%;padding:8px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:12px;outline:none;resize:vertical;min-height:40px}
.comment-box:focus{border-color:#22d3ee}
.label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-top:12px;margin-bottom:4px;font-weight:600}
.app-link{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#06b6d4,#a855f7);color:#fff;padding:12px 20px;border-radius:12px;text-decoration:none;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(6,182,212,.3);z-index:100;display:flex;align-items:center;gap:6px}
.app-link:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(6,182,212,.4)}
.export-btn{padding:6px 14px;border-radius:8px;border:1px solid #334155;background:#111827;color:#22d3ee;font-size:11px;cursor:pointer}
.export-btn:hover{background:#22d3ee15}
.module-group{font-size:11px;font-weight:700;color:#64748b;padding:20px 0 8px 0;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #1e293b20}
</style>
</head>
<body>

<div class="header">
  <h1>🧪 AgencyBook Test Runner</h1>
  <div class="stats">
    <div class="stat"><div class="stat-val blue" id="s-total">0</div><div>মোট</div></div>
    <div class="stat"><div class="stat-val green" id="s-pass">0</div><div>পাস ✓</div></div>
    <div class="stat"><div class="stat-val red" id="s-fail">0</div><div>ফেইল ✗</div></div>
    <div class="stat"><div class="stat-val amber" id="s-skip">0</div><div>স্কিপ</div></div>
    <div class="stat"><div class="stat-val" id="s-pct" style="color:#a855f7">0%</div><div>সম্পন্ন</div></div>
  </div>
  <button class="export-btn" onclick="exportResults()">📥 ফলাফল Export</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="controls">
  <input class="search" id="search" placeholder="🔍 টেস্ট খুঁজুন (নাম, মডিউল, ID)..." oninput="render()">
  <button class="filter-btn active" onclick="setFilter('all',this)">সব</button>
  <button class="filter-btn" onclick="setFilter('pending',this)">⬜ বাকি</button>
  <button class="filter-btn" onclick="setFilter('pass',this)">✅ পাস</button>
  <button class="filter-btn" onclick="setFilter('fail',this)">❌ ফেইল</button>
  <button class="filter-btn" onclick="setFilter('skip',this)">⚠️ স্কিপ</button>
  <button class="filter-btn" onclick="setFilter('HIGH',this)">🔴 HIGH</button>
</div>

<div class="main" id="test-list"></div>

<a class="app-link" href="https://demo.agencybook.net" target="_blank">🚀 অ্যাপ খুলুন →</a>

<script>

// ═══════════════════════════════════════════════
// State Management (localStorage persist)
// ═══════════════════════════════════════════════
const KEY = 'agencybook_test_results';
let results = JSON.parse(localStorage.getItem(KEY) || '{}');
let filter = 'all';

function save() { localStorage.setItem(KEY, JSON.stringify(results)); }

function setResult(id, status) {
  if (results[id]?.status === status) { delete results[id]; } // toggle off
  else { results[id] = { status, time: new Date().toISOString(), ...(results[id]||{}) }; }
  save(); render();
}

function setComment(id, comment) {
  results[id] = { ...(results[id]||{}), comment };
  save();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleCard(id) {
  document.getElementById('card-'+id)?.classList.toggle('open');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let visible = TESTS.filter(t => {
    if (q && !t.id.toLowerCase().includes(q) && !t.title.toLowerCase().includes(q) && !t.module.toLowerCase().includes(q)) return false;
    const r = results[t.id]?.status;
    if (filter === 'pending') return !r;
    if (filter === 'pass') return r === 'pass';
    if (filter === 'fail') return r === 'fail';
    if (filter === 'skip') return r === 'skip';
    if (filter === 'HIGH') return t.priority === 'HIGH';
    return true;
  });

  // Stats
  const total = TESTS.length;
  const pass = TESTS.filter(t => results[t.id]?.status === 'pass').length;
  const fail = TESTS.filter(t => results[t.id]?.status === 'fail').length;
  const skip = TESTS.filter(t => results[t.id]?.status === 'skip').length;
  const done = pass + fail + skip;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-pass').textContent = pass;
  document.getElementById('s-fail').textContent = fail;
  document.getElementById('s-skip').textContent = skip;
  document.getElementById('s-pct').textContent = Math.round(done/total*100) + '%';
  document.getElementById('progress').style.width = (done/total*100) + '%';

  // Group by module
  let html = '';
  let lastModule = '';
  visible.forEach(t => {
    if (t.module !== lastModule) { lastModule = t.module; html += `<div class="module-group">${t.module}</div>`; }
    const r = results[t.id]?.status || '';
    const comment = results[t.id]?.comment || '';
    html += `
    <div class="test-card ${r}" id="card-${t.id}">
      <div class="test-header" onclick="toggleCard('${t.id}')">
        <span class="test-id">${t.id}</span>
        <span class="test-module">${t.module}</span>
        <span class="test-title">${t.title}</span>
        <span class="priority ${t.priority}">${t.priority}</span>
        <div class="actions" onclick="event.stopPropagation()">
          <button class="action-btn pass-btn" onclick="setResult('${t.id}','pass')" title="পাস">✓</button>
          <button class="action-btn fail-btn" onclick="setResult('${t.id}','fail')" title="ফেইল">✗</button>
          <button class="action-btn skip-btn" onclick="setResult('${t.id}','skip')" title="স্কিপ">⊘</button>
        </div>
      </div>
      <div class="test-body">
        <div class="label">ধাপ (Step by Step)</div>
        <div class="step-box">${t.steps}</div>
        <div class="label">প্রত্যাশিত ফলাফল</div>
        <div class="expected">✅ ${t.expected}</div>
        <div class="label">মন্তব্য (সমস্যা থাকলে লিখুন)</div>
        <textarea class="comment-box" placeholder="সমস্যার বিবরণ বা স্ক্রিনশট লিংক..."
          oninput="setComment('${t.id}',this.value)">${comment}</textarea>
      </div>
    </div>`;
  });
  document.getElementById('test-list').innerHTML = html || '<p style="text-align:center;padding:40px;color:#64748b">কোনো টেস্ট পাওয়া যায়নি</p>';
}

function exportResults() {
  let csv = '\uFEFF' + 'টেস্ট ID,মডিউল,নাম,অগ্রাধিকার,ফলাফল,সময়,মন্তব্য\n';
  TESTS.forEach(t => {
    const r = results[t.id] || {};
    csv += `${t.id},"${t.module}","${t.title}",${t.priority},${r.status||'বাকি'},${r.time||''},${(r.comment||'').replace(/"/g,'""')}\n`;
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `TestResults_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}

render();
</script>
